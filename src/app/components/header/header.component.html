<header>
  <div class="hdr-op-name" id="tut-op-name">{{ state.battleModeLabel() }}</div>
  <div class="hdr-mid">
    <div class="bn" id="tut-battle-counter">
      BATTLE {{ state.battle() + 1 }} / {{ state.battleCountTotal() }}
    </div>
  </div>
  <div class="hdr-right">
    <button type="button" class="hdr-btn" (click)="backHomeClicked.emit()">BACK TO HOME</button>
    <button type="button" class="hdr-btn" id="tut-help-btn" (click)="helpClicked.emit()">HELP</button>
    <div class="build-tag">{{ version }} · {{ stamp }}</div>
  </div>
</header>
