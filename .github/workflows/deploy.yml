name: Deploy Angular App

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build Angular app
        run: npm run build -- --configuration production --base-href=/Overload/

      - name: Debug - List dist contents
        run: ls -la dist/
      
      - name: Debug - Check if index.html exists
        run: test -f dist/overload-protocol/index.html && echo "index.html found" || echo "index.html NOT found"
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist/overload-protocol
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4